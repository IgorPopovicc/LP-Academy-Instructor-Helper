<header class="app-header">
  <div class="container head-inner">
    <div class="brand">
      <img src="assets/lpa.png" alt="LP Academy" width="200" height="200" />
      <div class="brand-text">
        <strong>Instructor Q&amp;A Helper</strong>
        <span>Focused inbox for faster Udemy support workflow</span>
      </div>
    </div>

    <div class="head-actions">
      <a class="btn-ghost" href="https://www.udemy.com/instructor/communication/qa/" target="_blank" rel="noopener">
        Open Udemy Q&amp;A
      </a>
      <button class="btn-ghost theme-btn" (click)="toggleTheme()" aria-label="Toggle theme">
        <span class="theme-icon" aria-hidden="true">◐</span>
        Theme
      </button>
    </div>
  </div>
</header>

@if (extensionPrompt().showPrompt) {
  <section class="container extension-alert-wrap" aria-live="polite">
    <article class="extension-alert" [class.extension-alert-unsupported]="extensionPrompt().status === 'unsupported'">
      <div class="extension-alert-copy">
        <h2>{{ extensionPrompt().title }}</h2>
        <p>{{ extensionPrompt().message }}</p>
      </div>

      <div class="extension-alert-actions">
        @if (extensionPrompt().canInstall) {
          <button class="btn" type="button" (click)="openExtensionInstall()">Install Extension</button>
        }
        <button class="btn-ghost" type="button" (click)="recheckExtension()">Check Again</button>
        <button class="btn-ghost" type="button" (click)="dismissExtensionPrompt()">Dismiss</button>
      </div>
    </article>
  </section>
}

<main class="container app-body">
  <app-qa-inbox></app-qa-inbox>
</main>

<footer class="app-footer">
  <div class="container">
    <span class="tag">LP Academy Tools</span>
    <span class="foot-meta">Built for high-volume instructor Q&amp;A triage</span>
  </div>
</footer>

<router-outlet />
